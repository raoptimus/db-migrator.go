services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    volumes:
      - ".docker/volume/clickhouse/dump:/docker-entrypoint-initdb.d/"
      - ".docker/volume/clickhouse/config/clickhouse/users.xml:/etc/clickhouse-server/users.d/users.xml"

  postgres:
    image: postgres:16-alpine
    volumes:
      - ".docker/volume/postgres/dump:/docker-entrypoint-initdb.d/"
    env_file:
      - .env

  mysql:
    image: mysql:8.0.31
    env_file:
      - .env

  tarantool:
    image: tarantool/tarantool:3.5
    env_file:
      - .env

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/warehouse &&
        echo 'Bucket warehouse created'
      "

  iceberg-rest:
    image: apache/iceberg-rest-fixture:latest
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/v1/config"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./
      dockerfile: Dockerfile
    working_dir: "/usr/src/app"
    command: "sleep infinity"
    depends_on:
      - clickhouse
      - clickhouse1
      - clickhouse2
      - clickhouse-r-1
      - clickhouse-r-2
      - postgres
      - mysql
      - tarantool
      - iceberg-rest
      - minio
    links:
      - clickhouse
      - clickhouse1
      - clickhouse2
      - clickhouse-r-1
      - clickhouse-r-2
      - postgres
      - mysql
      - tarantool
      - iceberg-rest
      - minio
    volumes:
      - "./:/usr/src/app"
      - "~/.cache/go-build:/root/.cache/go-build"
      - "~/go/pkg/mod:/root/go/pkg/mod"
    env_file:
      - .env

  clickhouse-keeper:
    image: clickhouse/clickhouse-keeper:25.8-alpine
    restart: on-failure
    volumes:
      - ".docker/volume/clickhouse-cluster/config/keeper1/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml"

  clickhouse1:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: on-failure
    volumes:
      - ".docker/volume/clickhouse-cluster/config/clickhouse1:/etc/clickhouse-server/config.d/"
      - ".docker/volume/clickhouse-cluster/config/clickhouse1/users.xml:/etc/clickhouse-server/users.d/users.xml"
    depends_on:
      - clickhouse-keeper

  clickhouse2:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: on-failure
    volumes:
      - ".docker/volume/clickhouse-cluster/config/clickhouse2:/etc/clickhouse-server/config.d/"
      - ".docker/volume/clickhouse-cluster/config/clickhouse1/users.xml:/etc/clickhouse-server/users.d/users.xml"
    depends_on:
      - clickhouse-keeper

  clickhouse-keeper-r:
    image: clickhouse/clickhouse-keeper:25.8-alpine
    restart: on-failure
    volumes:
      - ".docker/volume/clickhouse-cluster-replicated/config/keeper1/keeper_config.xml:/etc/clickhouse-keeper/keeper_config.xml"

  clickhouse-r-1:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: on-failure
    volumes:
      - ".docker/volume/clickhouse-cluster-replicated/config/clickhouse1:/etc/clickhouse-server/config.d/"
      - ".docker/volume/clickhouse-cluster-replicated/config/clickhouse1/users.xml:/etc/clickhouse-server/users.d/users.xml"
    depends_on:
      - clickhouse-keeper-r

  clickhouse-r-2:
    image: clickhouse/clickhouse-server:25.8-alpine
    restart: on-failure
    volumes:
      - ".docker/volume/clickhouse-cluster-replicated/config/clickhouse2:/etc/clickhouse-server/config.d/"
      - ".docker/volume/clickhouse-cluster-replicated/config/clickhouse2/users.xml:/etc/clickhouse-server/users.d/users.xml"
    depends_on:
      - clickhouse-keeper-r
